<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      10)Faça um programa que leia 5 números inteiros e verifique se algum deles
      é igual a zero.
    </p>
    <script>
      let numero = [];
      let zero = 0;
      for (let i = 0; i < 10; i++) {
        numero[i] = parseInt(prompt("Digite um número"));
        if (numero[i] == 0) {
          zero++;
        }
      }
      console.log(zero + " números são iguais a zero");
    </script>
  </body>
</html>
