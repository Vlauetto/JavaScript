<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      01) Faça um programa que leia 5 números inteiros e exiba-os na ordem
      inversa em que foram digitados.
    </p>

    <script>
      let vetor = [];

      for (let i = 0; i < 5; i++) {
        vetor[i] = parseInt(prompt("Digite o número " + (i + 1) + ":"));
      }

      for (let i = vetor.length - 1; i >= 0; i--) {
        console.log(vetor[i]);
      }
    </script>
  </body>
</html>
