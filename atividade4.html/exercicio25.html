<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      25) Faça um programa que leia uma matriz 4x4 de números inteiros e exiba a
      soma dos elementos de cada coluna.
    </p>
    <script>
      const matriz = [];

      for (let i = 0; i < 4; i++) {
        matriz[i] = [];
        for (let j = 0; j < 4; j++) {
          matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
        }
      }

      for (let j = 0; j < 4; j++) {
        let soma = 0;
        let linha = "";

        for (let i = 0; i < 4; i++) {
          linha += matriz[i][j] + "  ";
          soma += matriz[i][j];
        }

        console.log(linha);
        console.log("Soma total" + j + ":" + soma);
      }
    </script>
  </body>
</html>
