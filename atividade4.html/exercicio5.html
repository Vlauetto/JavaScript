<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      05) Escreva um programa que leia 5 números inteiros e exiba o maior e o
      menor valor digitado.
    </p>

    <script>
      let numeros = [0];

      for (let i = 0; i < 5; i++) {
        numeros[i] = parseInt(prompt("Digite um número"));
      }

      let maior = numeros[0];
      let menor = numeros[0];

      for (let i = 1; i < numeros.length; i++) {
        if (numeros[i] > maior) {
          maior = numeros[i];
        }
        if (numeros[i] < menor) {
          menor = numeros[i];
        }
      }
      console.log("Maior:", maior);
      console.log("Menor:", menor);
    </script>
  </body>
</html>
