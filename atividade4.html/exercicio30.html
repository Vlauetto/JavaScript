<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      30) Crie um programa que leia duas matrizes 2x2 de números inteiros e
      exiba a subtração
    </p>
    <script>
      const matriz1 = [];
      let soma1 = 0;
      for (let i = 0; i < 2; i++) {
        matriz1[i] = [];
        for (let j = 0; j < 2; j++) {
          matriz1[i][j] = parseInt(
            prompt(`Digite o elemento da matriz um[${i}][${j}]:`),
          );
        }
      }
      for (let i = 0; i < 2; i++) {
        let linha1 = "";
        for (let j = 0; j < 2; j++) {
          linha1 += matriz1[i][j] + "  ";
          soma1 += matriz1[i][j];
        }
        console.log(linha1);
      }

      const matriz2 = [];
      let soma2 = 0;
      for (let i = 0; i < 2; i++) {
        matriz2[i] = [];
        for (let j = 0; j < 2; j++) {
          matriz2[i][j] = parseInt(
            prompt(`Digite o elemento da matriz um[${i}][${j}]:`),
          );
        }
      }
      for (let i = 0; i < 2; i++) {
        let linha2 = "";
        for (let j = 0; j < 2; j++) {
          linha2 += matriz2[i][j] + "  ";
          soma2 += matriz2[i][j];
        }
        console.log(linha2);
      }
      let somaTotal = soma1 - soma2;
      console.log("Subtração total: " + somaTotal);
    </script>
  </body>
</html>
