<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      17) Escreva um programa que leia uma matriz 2x2 de números inteiros e
      calcule a soma de todos os elementos.
    </p>
    <script>
      const matriz = [];
      let soma = 0;
      for (let i = 0; i < 2; i++) {
        matriz[i] = [];
        for (let j = 0; j < 2; j++) {
          matriz[i][j] = parseInt(prompt("Digite o elemento [${i}][${j}]:"));
        }
      }

      for (let i = 0; i < 2; i++) {
        let linha = "";
        for (let j = 0; j < 2; j++) {
          linha += matriz[i][j] + "  ";
          soma += matriz[i][j];
        }
        console.log(linha);
      }
      console.log("Soma total: " + soma);
    </script>
  </body>
</html>
