<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      11) Escreva um programa que leia 10 números inteiros e exiba a soma dos
      valores positivos e a soma dos valores negativos.
    </p>
    <script>
      let positivo = 0;
      let negativo = 0;
      let meuVetor = [];
      for (let i = 0; i < 10; i++) {
        meuVetor[i] = parseInt(prompt("Digite 10 numeros inteiros: "));
        if (meuVetor[i] > 0) {
          positivo++;
        } else if (meuVetor[i] < 0) {
          negativo++;
        }
      }
      console.log("Os numeros positivos são: " + positivo);
      console.log("Os numeros negativos são: " + negativo);
    </script>
  </body>
</html>
