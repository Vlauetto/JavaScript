<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      13) Faça um programa que leia 10 números inteiros e exiba quantos deles
      estão no intervalo de 10 a 50.
    </p>
    <script>
     let numero = []
        let intervalo = 0
        for(let i = 0; i<10; i++){
            numero[i] = parseInt(prompt("Digite um número"))
            if(numero[i]>=10 && numero[i]<=50){
                intervalo++
            }
        }
        console.log(intervalo + " números estão entra 10 e 50")
    </script>
  </body>
</html>
