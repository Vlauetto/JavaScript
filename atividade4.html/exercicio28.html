<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      28)Faça um programa que leia uma matriz 4x4 de números inteiros e exiba o
      maior valor presente em cada linha.
    </p>
    <script>
      const matriz = [];
      for (let i = 0; i < 4; i++) {
        matriz[i] = [];
        for (let j = 0; j < 4; j++) {
          matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
        }
      }

      for (let i = 0; i < 4; i++) {
        let linha = "";
        for (let j = 0; j < 4; j++) {
          linha += matriz[i][j] + "  ";
        }
        console.log(linha);
      }

      for (let i = 0; i < 4; i++) {
        let maior = matriz[0][0];

        for (let j = 0; j < 4; j++) {
          if (matriz[i][j] > maior) {
            maior = matriz[i][j];
          }
        }

        console.log(" Mair da linha " + maior);
      }
    </script>
  </body>
</html>
