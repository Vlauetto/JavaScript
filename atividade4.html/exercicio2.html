<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>02) Escreva um programa que leia 10 números inteiros e exiba a soma deles. </p>

    <script>
        let numero = []
        let soma = 0
        for(let i = 0; i<10; i++){
            numero[i] = parseInt(prompt("Digite 10 números"))
            soma += numero[i]
        }
        console.log("Soma: "+ soma)
    </script>
</body>
</html>
