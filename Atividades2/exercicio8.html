<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repita comigo</title>
  </head>
  <body>
    <p>
      8 - Ler um valor N e imprimir todos os valores inteiros entre 1
      (inclusive) e N (inclusive). Considere que o N será sempre maior que ZERO.
      N é um valor informado pelo usuário
    </p>
    <script>
      let N = parseInt(prompt("Digite o valor de N:"));

      for (let i = 1; i <= N; i++) {
        document.write(i + " ");
      }
    </script>
  </body>
</html>
