<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=>, initial-scale=1.0" />
    <title>Repita comigo</title>
  </head>
  <body>
    <p>
      9 - Escreva um algoritmo para imprimir os 10 primeiros números inteiros
      maiores que 100.
    </p>

    <script>
      let quantidade = 0;
      let i = 101;

      while (quantidade < 10) {
        document.write(i + " ");
        quantidade++;
        i++;
      }
    </script>
  </body>
</html>
