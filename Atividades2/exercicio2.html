<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repita comigo</title>
  </head>
  <body>
    <p>
      Crie uma bomba relógio (usando somente código - para deixar claro!) cuja
      contagem regressiva vá de 30 a 0. Utilize "document.write" para escrever
      em tela e no final da repetição escreva "EXPLOSÃO".
    </p>

    <script>
      for (let i = 30; i >= 0; i--) {
        alert(i + " ");
      }
      document.write("EXPLOSÃO!");
    </script>
  </body>
</html>
