<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Condicionais</title>
  </head>
  <body>
    <h1>Comandos condicionais IF</h1>

    <script>
      let nota1 = parseFloat(prompt("Entre com a primeira nota"))
      document.write("A primeira nota é:" + nota1)

        let nota2 = parseFloat(prompt("Entre com a segunda nota"))
      document.write("<br> A segunda nota é:" + nota2)

        let nota3 = parseFloat(prompt("Entre com a terceira nota"))
      document.write("<br> A terceira nota é:" + nota3)

        let nota4 = parseFloat(prompt("Entre com a quarta nota"))
      document.write("<br> A quarta nota é:" + nota4)

      let media = (nota1 + nota2 + nota3 + nota4)/4
      document.write("<br> A média das notas é:" + media)

      if (media >= 6){
        document.write("<br>Você está aprovado! Parabéns!")
      } 
      
      else if (media >=5){
        alert(" Você está de recuperação")
      }
      
      else{
        document.write("<br> Você está reprovado! Vacilão!")
      }


    </script>
  </body>
</html>
