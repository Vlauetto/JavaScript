<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos usando Javasript</title>
</head>
<body>

    <h1>Testando cálculos usando Javascript</h1>

    <script>
        let numero1 = 20;
        let numero2 = 40;

        let soma = numero1 + numero2;
        let media = (numero1 + numero2) / 2;
        let multiplica = numero1 * numero2;
        let divisao = numero1 / numero2

        document.write("a soma dos números é" + soma);
        document.write("<br> a media dos numeros é:" + media);
        document.write("<br> a multiplicaçao dos números é:" + multiplica);
        document.write("<br> a divisao dos numeros é:" + divisao);

    </script>
</body>
</html>
