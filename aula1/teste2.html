<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comandos usando Javascript</title>
</head>
<body>
    <h1>Testando comandos usando Javascript</h1>

    <script>
        let nome = "Debora" // variável do tipo string (letras, números e caracteres especiais)
        let idade = 53 // variável do tipo int
        let altura = 1.78  // variável do tipo float (valores númericos quebrados)
        let salario = 38000.55 // variável do tipo double (valores que usa muito espaço em memória)
        let mestrado = false // variável do tipo boolean (verdadeiro ou falso)


        document.write("Meu nome é:" + nome);
        document.write("<br>Minha idade é" + idade);
        document.write("<br>Minha altura é:" + altura);
        document.write("<br>Meu salário é" + salario);
        document.write("<br>Eu tenho mestrado" + mestrado);

        let nome1 = "Vitótia" // variável do tipo string (letras, números e caracteres especiais)
        let idade1 = 18 // variável do tipo int
        let altura1 = 1.62  // variável do tipo float (valores númericos quebrados)
        let salario1 = 1000 // variável do tipo double (valores que usa muito espaço em memória)
        let mestrado1 = false // variável do tipo boolean (verdadeiro ou falso)

         document.write("<br> <br> Meu nome é:" + nome1);
        document.write("<br> Minha idade é" + idade1);
        document.write("<br> Minha altura é:" + altura1);
        document.write("<br>Meu salário é" + salario1);
        document.write("<br>Eu tenho mestrado" + mestrado1);
    </script>
    
</body>
</html>
