<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendo media da notas com Javasript</title>
</head>
<body>
    <h1> Média das notas</h1>

    <script>
        let nota1 = parseFloat( prompt("Coloque sua 1 nota"))
         document.write("A primeira nota é:" + nota1)

         let nota2 = parseFloat( prompt("Coloque sua 2 nota"))
         document.write("<br> A segunda nota é:" + nota2)

         let nota3 = parseFloat( prompt("Coloque sua 3 nota"))
         document.write("<br> A terceira nota é:" + nota3)

         let nota4 = parseFloat( prompt("Coloque sua 4 nota"))
         document.write("<br> A quarta nota é:" + nota4)

         let media = (nota1 + nota2 + nota3 + nota4) / 2
         document.write("<br> <br> A média de suas notas é:" + media)
    </script>
</body>
</html>
