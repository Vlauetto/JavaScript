<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos usando o javascriptt</title>
</head>
<body>
    <h1>
        Testando cálculos usando o javacript
    </h1>

    <script>
        let numero1 = parseFloat( prompt("entre com o primeiro número"))
         document.write("O primeiro númeroé:" + numero1)

        let numero2 = parseFloat(prompt("entre com o segundo número"))
         document.write("<br>O segundo número é:" + numero2)

         let soma = numero1 + numero2
         document.write("<br>a soma dos seus números é" + soma)

         let divisao = numero1 / numero2
         document.write("<br>a divisao dos seus números é" + divisao)

         let  media = (numero1 + numero2) / 2
         document.write("<br>a media dos seus números é" + media)


    </script>
</body>
</html>
