<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      22) Faça um programa que leia um número inteiro e exiba se ele é um número
      primo usando o loop "do-while".
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let i = 2,
        primo = true;

      do {
        if (n % i == 0 && i < n) primo = false;
        i++;
      } while (i < n);

      console.log(primo);
    </script>
  </body>
</html>
