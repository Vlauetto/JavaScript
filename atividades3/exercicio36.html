<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      36) Crie um programa que leia um número inteiro positivo e exiba todos os
      divisores desse número.
    </p>
    <script>
      let n = Number(prompt("Número:"));

      for (let i = 1; i <= n; i++) {
        if (n % i == 0) console.log(i);
      }
    </script>
  </body>
</html>
