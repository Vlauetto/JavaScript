  <body>
    <p>
      12) Crie um programa que exiba os números ímpares de 1 a 50 usando o loop
      "while".
    </p>
    <script>
      let i = 1;

      while (i <= 50) {
        if (i % 2 != 0) console.log(i);
        i++;
      }
    </script>
  </body>
