<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      11) Escreva um programa que leia um número inteiro e exiba a soma de todos
      os números pares entre 1 e o número lido usando o loop "while".
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let i = 1,
        soma = 0;

      while (i <= n) {
        if (i % 2 == 0) soma += i;
        i++;
      }

      console.log(soma);
    </script>
  </body>
</html>
