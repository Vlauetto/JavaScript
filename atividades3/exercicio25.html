<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      25) Faça um programa que exiba os primeiros 20 números da sequência de
      Fibonacci usando o loop "do-while".
    </p>
    <script>
      let i = 0,
        a = 0,
        b = 1;

      do {
        console.log(a);
        let temp = a + b;
        a = b;
        b = temp;
        i++;
      } while (i < 20);
    </script>
  </body>
</html>
