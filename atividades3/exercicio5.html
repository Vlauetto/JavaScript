<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <p>
      5) Escreva um programa que leia um número inteiro e exiba a tabuada desse
      número até o décimo valor usando o loop "while".
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let i = 1;

      while (i <= 10) {
        console.log(n * i);
        i++;
      }
    </script>
  </body>
</html>
