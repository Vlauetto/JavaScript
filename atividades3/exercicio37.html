<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      37) Faça um programa que leia um número inteiro e exiba se ele é um número
      primo.
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let primo = true;

      for (let i = 2; i < n; i++) {
        if (n % i == 0) primo = false;
      }

      console.log(primo);
    </script>
  </body>
</html>
