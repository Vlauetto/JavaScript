  <body>
    <p>
      40) Faça um programa que exiba os primeiros 20 números da sequência de
      Fibonacci.
    </p>
    <script>
      let a = 0,
        b = 1;

      for (let i = 0; i < 20; i++) {
        console.log(a);
        let temp = a + b;
        a = b;
        b = temp;
      }
    </script>
  </body>
