<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      19) Faça um programa que leia 5 números inteiros usando o loop "do-while"
      e exiba a média aritmética dos valores lidos.
    </p>
    <script>
      let i = 0,
        soma = 0;

      do {
        let n = Number(prompt("Número:"));
        soma += n;
        i++;
      } while (i < 5);

      console.log(soma / 5);
    </script>
  </body>
</html>
