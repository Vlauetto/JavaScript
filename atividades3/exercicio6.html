<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      6) Crie um programa que leia um número inteiro positivo e exiba todos os
      divisores desse número usando o loop "while".
    </p>
    <script>
      let num = Number(prompt("Número:"));
      let i = 1;

      while (i <= num) {
        if (num % i == 0) console.log(i);
        i++;
      }
    </script>
  </body>
</html>
