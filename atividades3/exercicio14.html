<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <p>
      14) Escreva um programa que calcule o fatorial de um número inteiro
      inserido pelo usuário usando o loop "while".
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let f = 1;

      while (n > 1) {
        f *= n;
        n--;
      }

      console.log(f);
    </script>
  </body>
</html>
