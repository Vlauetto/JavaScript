<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      17) Escreva um programa que calcule a soma dos números de 1 a 100 usando o
      loop "do-while".
    </p>
    <script>
      let i = 1,
        soma = 0;

      do {
        soma += i;
        i++;
      } while (i <= 100);

      console.log(soma);
    </script>
  </body>
</html>
