<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      21) Crie um programa que leia um número inteiro positivo e exiba todos os
      divisores desse número usando o loop "do-while".
    </p>
    <script>
      let n = Number(prompt("Número:"));
      let i = 1;

      do {
        if (n % i == 0) console.log(i);
        i++;
      } while (i <= n);
    </script>
  </body>
</html>
