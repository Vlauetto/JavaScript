<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      9) Crie um programa que leia o nome e a idade de 5 pessoas usando o loop
      "while" e exiba a média das idades.
    </p>
    <script>
      let i = 0,
        soma = 0;

      while (i < 5) {
        let nome = prompt("Nome:");
        let idade = Number(prompt("Idade:"));
        soma += idade;
        i++;
      }

      console.log(soma / 5);
    </script>
  </body>
</html>
