<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercicio em javascript</title>
  </head>
  <body>
    <p>
      17- Escreva um programa que leia a idade de 20 pessoas e exiba quantas
      pessoas são maiores de idade.
    </p>

    <script>
      let maiores = 0;

      for (let i = 1; i <= 20; i++) {
        let idade = parseFloat(prompt("Digite a " + i + "ª idade:"));

        if (idade >= 18) {
        maiores++
      }
      }

      alert("Quantidade de maiores de idade: " + maiores);
    </script>
  </body>
</html>
