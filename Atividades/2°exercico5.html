<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercício de Javascript</title>
  </head>
  <body>
    <p>
      5- Crie um programa em javascript que leia a idade de uma pessoa e informe
      a sua classe eleitoral: · não eleitor (abaixo de 16 anos); · eleitor
      obrigatório (entre a faixa de 18 e menor de 65 anos); · eleitor
      facultativo (de 16 até 18 anos e maior de 65 anos, inclusive).
    </p>

    <script>
      let numero = parseFloat(
        prompt("Informe sua idade e descubra sua classe eleitoral"),
      );
      
      if (numero < 16) {
        alert("Não eleitor");
      } else if (numero >= 18 && numero < 65) {
        alert("Eleitor obrigatório");
      } else if ((numero >= 16 && numero < 18) || numero >= 65) {
        alert("Eleitor facultativo");
      }
    </script>
  </body>
</html>
