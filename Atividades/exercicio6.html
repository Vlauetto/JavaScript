<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sexto exercicio</title>
  </head>
  <body>
    <p>
      6. Desenvolva um algoritmo em Java que leia um número inteiro e imprima o
      seu antecessor e seu sucessor.
    </p>

    <script>
        let numero = parseFloat(prompt("Informe um número inteiro:"));

        let antecessor = numero - 1;
        let sucessor = numero + 1;

        document.write("O antecessor do " + numero + " é " + antecessor + " e seu sucessor é " + sucessor)
    </script>
  </body>
</html>
