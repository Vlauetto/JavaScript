<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>
      19- Elaborar um programa que efetue a apresentação do valor da conversão
      em real (R$) de um valor lido em dólar (US$). O programa deverá solicitar
      o valor da cotação do dólar e também a quantidade de dólares disponíveis
      com o usuário.
    </p>

    <script>
      let cotacao = parseFloat(prompt("Digite a cotação do dólar (R$):"));
      let dolares = parseFloat(
        prompt("Digite a quantidade de dólares disponíveis:"),
      );

      let resultado = cotacao * dolares;

      alert("US$ " + dolares.toFixed(2) + " = R$ " + resultado.toFixed(2));
    </script>
  </body>
</html>
