<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2 lista de exercicios em Javascript</title>
  </head>
  <body>
    <p>
      2- Escreva um programa em Javascript, que leia um número e informe se ele
      é divisível por 10, por 5 ou por 2 ou se não é divisível por nenhum deles.
    </p>

    <script>
      let numero = parseFloat(
        prompt(
          "Escreva o número que gostaria de saber se é divisível por 2, por 5 ou por 10",
        ),
      );

      let por2 = numero % 2 === 0;
      let por5 = numero % 5 === 0;
      let por10 = numero % 10 === 0;

      if (por10 && por5 && por2) {
        resultado = numero + " é divisível por 10, 5 e 2";
      } else if (por5 && por2) {
        resultado = numero + " é divisível por 5 e 2";
      } else if (por10) {
        alert(numero + " é divisível por 10");
      } else if (por5) {
        alert(numero + " é divisível por 5");
      } else if (por2) {
        alert(numero + " é divisível por 2");
      } else {
        alert(numero + " não é divisível por 2, 5 nem por 10");
      }

      alert(resultado)
      document.write("O número digitado foi: " + numero + ". " + resultado);
    </script>
  </body>
</html>
