<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercicio em javascript</title>
  </head>
  <body>
    <p>
      13- Ler uma temperatura em graus Celsius e apresentá-la convertida em
      graus Fahrenheit. A fórmula de conversão é: F=(9*C+160) / 5, sendo F a
      temperatura em Fahrenheit e C a temperatura em Celsius.
    </p>

    <script>
        let Celsius = parseFloat(prompt("Digite a temperatura em grau Celsius "))
        let Fahrenheit = (9 * Celsius +160) / 5
       
        alert(Celsius + "°C é igual a " + Fahrenheit + "°F.")
    </script>
  </body>
</html>
