<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercicio em javascrip</title>
  </head>
  <body>
    <p>
      20- Escreva um programa que leia 20 números do usuário e exiba quantos
      números são maiores do que 8.
    </p>

    <script>
      let maiores = 0;

      for (let i = 1; i <= 20; i++) {
        let numero = parseFloat(prompt("Digite a " + i + "ª idade:"));

        if (numero > 8) {
          maiores++;
        }
      }

      alert("Quantidade de números maiores que 8: " + maiores);
    </script>
  </body>
</html>
