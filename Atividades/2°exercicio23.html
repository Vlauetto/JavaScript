<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercicio em javascrip</title>
  </head>
  <body>
    <p>
      23- Faça um programa que leia 20 números e, ao final, escreva quantos
      estão entre 0 e 100, quantos estão entre 101 e 200 e quantos são maiores
      de 200.
    </p>

    <script>
      let entre0e100 = 0;
      let entre101e200 = 0;
      let maiores200 = 0;

      for (let i = 1; i <= 20; i++) {
        let numero = parseFloat(prompt("Digite o " + i + "º número:"));

        if (numero >= 0 && numero <= 100) {
          entre0e100++;
        } else if (numero >= 101 && numero <= 200) {
          entre101e200++;
        } else if (numero > 200) {
          maiores200++;
        }
      }

      alert(
        "Entre 0 e 100: " +
          entre0e100 +
          " números\n" +
          "Entre 101 e 200: " +
          entre101e200 +
          " números\n" +
          "Maiores que 200: " +
          maiores200 +
          " números",
      );
    </script>
  </body>
</html>
