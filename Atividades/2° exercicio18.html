<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2° lista de exercicio em javascript</title>
  </head>
  <body>
    <p>
      18- Escreva um programa que leia o nome e a idade de 10 pessoas e exiba o
      nome da pessoa mais nova.
    </p>

    <script>
      let nomeMaisNovo = "";
      let idadeMaisNova = Infinity;

      for (let i = 1; i <= 10; i++) {
        let nome = prompt("Digite o " + i + "º nome:");
        let idade = parseFloat(prompt("Digite a idade de " + nome + ":"));

        if (idade < idadeMaisNova) {
          idadeMaisNova = idade;
          nomeMaisNovo = nome;
        }
      }

      alert(
        "A pessoa mais nova é: " +
          nomeMaisNovo +
          " com " +
          idadeMaisNova +
          " anos.",
      );
    </script>
  </body>
</html>
