<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos condicionais em Javascript</title>
</head>
<body>
    <h1>Testando comandos Switch/Case</h1>

    <script>
       let semaforo = prompt("Digite a cor do semafaro")

        switch(semaforo.toLowerCase()){
            case "vermelho": alert("PARE")
            break;

            case "verde": alert("Prossiga")
            break;

            case "amarelo": alert("Atenção")
            break;

            default:alert("cor inexistente!")
        }
    </script>
</body>
</html>
