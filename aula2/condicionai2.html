<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos condicionais usando Javascript</title>
</head>
<body>
    <h1> Testando comandos If - else if - else </h1>

    <script>
        let cor = prompt("Digite uma cor (Amarelo, Vermelho, Verde):").toLowerCase();
 
        if (cor === "vermelho") {
            alert("PARE!!");
        }
        else if (cor == "amarelo") {
            alert("Atenção");
        }
        else if (cor == "verde") {
            alert("Liberado, fi");
        }
        else {
           
            alert("Cor inválida!");
        }
 
    </script>
</body>
</html>
