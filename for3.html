<!DOCTYPE html>
<html lang="pt-">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comandos FOR</title>
</head>
<body>
    <h1>Testando comandos FOR</h1>

    <script>
        let n

        for(n=1; n<=100; n+=2){
            document.write("Número:" + n + "<br>" )
        }
    </script>
</body>
</html>
