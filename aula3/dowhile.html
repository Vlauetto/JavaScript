<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testando do while</title>
  </head>
  <body>
    <h1>Testando o comando do WHILE</h1>

    <script>
      let n = 1;

      do {
        document.write("Vitória Laurenzano");
        n++;
      } while (n <= 10);
    </script>
  </body>
</html>
