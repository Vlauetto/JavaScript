<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando while</title>
</head>
<body>
    <h1>Testando o comando WHILE</h1>


    <script>
        let n = 1

        while (n<=10){
            document.write("Vitória Laurenzano")
            n++
        }
    </script>
</body>
</html>
